<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - OpenShelf Library</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>

<div class="register-container">

    <h2>Welcome to OpenShelf.</h2>
    <p class="sub-text">Let's get you started.</p>

    <p class="login-text">
        Already have an account? 
        <a href="login.html">Log in</a>
    </p>

    <form action="../php/auth/register_process.php" method="POST" autocomplete="off">

        <div class="form-row">
            <input type="text" name="firstname" placeholder="First Name" required>
            <input type="text" name="lastname" placeholder="Last Name" required>
        </div>

        <div class="form-row">
            <input type="text" name="username" placeholder="Username" required>
            <input type="text" name="phone" placeholder="Phone" required>
        </div>

        <div class="form-row">
            <input type="email" name="email" placeholder="Email" required>
            
        </div>

        <div class="form-row">
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
        </div>

       

        <div class="checkbox-group">
            <label>
                <input type="checkbox" required>
                I agree to the <a href="#">Terms & Privacy Policy</a>.
            </label>
        </div>

        <button type="submit" name="register" class="btn-purple">Sign Up</button>

    </form>
</div>

</body>
</html>
